# CI runs tests and typechecks only. Deployment is handled by Cloudflare
# Workers Builds (production from main, previews from branches) — no deploy
# steps belong in GitHub Actions.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # The repo intentionally does not commit a package lock, so npm install
      # (not npm ci) is used here.
      - run: npm install --no-audit --no-fund
      - run: npm test
      - run: npm run build
      - run: npm run typecheck:worker
