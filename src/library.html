<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Proof — Library</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=20260310r">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=20260310r">
  <link rel="shortcut icon" href="/favicon.ico?v=20260310r">
  <link rel="apple-touch-icon" sizes="512x512" href="/apple-touch-icon.png?v=20260310r">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Token subset hand-copied from src/index.html's :root — this page
       reuses the same real design tokens (see docs/adr/2026-07-library-view.md
       for why it isn't a shared file yet). Keep in sync by hand if the
       source values change. */
    :root {
      --surface:        #ffffff;
      --surface-2:      #f4f4f8;
      --surface-3:      #ececf2;
      --bg:             #f7f7fa;
      --border:         #e5e5ec;
      --border-strong:  #d4d5df;
      --text:           #191a23;
      --text-2:         #4b4e60;
      --text-muted:     #797d90;
      --text-faint:     #a6a9b8;

      --btn-bg:         #191a23;
      --btn-bg-hover:   #2e303e;
      --btn-fg:         #ffffff;

      --link:           #2563eb;
      --link-hover:     #1d4ed8;
      --focus:          rgba(37, 99, 235, 0.32);

      --r-xs: 4px;   --r-sm: 6px;   --r-md: 8px;   --r-lg: 12px;   --r-xl: 16px;
      --r-pill: 999px;

      --sh-sm: 0 1px 2px rgba(20, 20, 45, 0.06);
      --sh-md: 0 4px 14px rgba(20, 20, 45, 0.09), 0 1px 3px rgba(20, 20, 45, 0.05);
      --ring:  0 0 0 3px var(--focus);

      --ui-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    :root[data-appearance="dark"] {
      --surface:        #191a22;
      --surface-2:      #22232f;
      --surface-3:      #2b2c3a;
      --bg:             #101017;
      --border:         #2c2d3a;
      --border-strong:  #3c3e50;
      --text:           #edeef5;
      --text-2:         #c3c5d4;
      --text-muted:     #9497a9;
      --text-faint:     #6a6d82;

      --btn-bg:         #edeef5;
      --btn-bg-hover:   #ffffff;
      --btn-fg:         #16171e;

      --link:           #7aa2ff;   --link-hover: #a7c1ff;   --focus: rgba(122, 162, 255, 0.36);

      --sh-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --sh-md: 0 4px 14px rgba(0, 0, 0, 0.5), 0 1px 3px rgba(0, 0, 0, 0.4);
    }

    html, body { background: var(--bg); color: var(--text); font-family: var(--ui-font); }
  </style>
  <link rel="stylesheet" href="./library-view/styles.css">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./library-view/main.ts"></script>
</body>
</html>
